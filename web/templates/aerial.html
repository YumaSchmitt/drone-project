<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ farmland.name }} - ドローン写真</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="app-layout">

  <!-- Header -->
  <header>
    <a href="/dashboard/{{ farm.id }}" class="header-back">← {{ farm.name }}</a>
    <span class="logo">🚁</span>
    <h1>{{ farmland.name }}</h1>
    <span class="subtitle">ドローン写真（仮）</span>
    <span class="spacer"></span>
    <span class="crop-badge" style="margin:0">{{ farmland.crop }}</span>
    <span class="header-owner">{{ farmland.area_ha }} ha</span>
  </header>

  <!-- Full-screen map -->
  <div class="aerial-area">
    <div id="aerial-map"></div>
    <canvas id="dark-overlay"></canvas>

    <!-- Timestamp selector bar -->
    <div id="timestamp-bar">
      <span class="ts-label">🚁 撮影時期（仮・衛星）</span>
      <div class="ts-sources" id="ts-sources"></div>
      <div class="ts-note" id="ts-note"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const polygon = {{ polygon_json | safe }};
const center = {{ center_json | safe }};

// ── Tile sources ────────────────────────────────────────────────────
// Each entry is a selectable timestamp/source. NASA GIBS Landsat monthly
// composites provide reliable global coverage from 2013 onward.
const SOURCES = [
  {
    id: "latest",
    label: "最新",
    sublabel: "Google",
    url: "https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
    opts: { maxZoom: 21, maxNativeZoom: 21, attribution: "Imagery © Google" },
  },
  {
    id: "2024",
    label: "2024",
    sublabel: "Landsat",
    url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Landsat_WELD_CorrectedReflectance_TrueColor_Global_Monthly/default/2024-06-01/GoogleMapsCompatible_Level12/{z}/{y}/{x}.jpg",
    opts: { maxZoom: 12, attribution: "NASA GIBS / Landsat" },
  },
  {
    id: "2023",
    label: "2023",
    sublabel: "Landsat",
    url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Landsat_WELD_CorrectedReflectance_TrueColor_Global_Monthly/default/2023-06-01/GoogleMapsCompatible_Level12/{z}/{y}/{x}.jpg",
    opts: { maxZoom: 12, attribution: "NASA GIBS / Landsat" },
  },
  {
    id: "2022",
    label: "2022",
    sublabel: "Landsat",
    url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Landsat_WELD_CorrectedReflectance_TrueColor_Global_Monthly/default/2022-06-01/GoogleMapsCompatible_Level12/{z}/{y}/{x}.jpg",
    opts: { maxZoom: 12, attribution: "NASA GIBS / Landsat" },
  },
  {
    id: "2020",
    label: "2020",
    sublabel: "Landsat",
    url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Landsat_WELD_CorrectedReflectance_TrueColor_Global_Monthly/default/2020-06-01/GoogleMapsCompatible_Level12/{z}/{y}/{x}.jpg",
    opts: { maxZoom: 12, attribution: "NASA GIBS / Landsat" },
  },
  {
    id: "2018",
    label: "2018",
    sublabel: "Landsat",
    url: "https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Landsat_WELD_CorrectedReflectance_TrueColor_Global_Monthly/default/2018-06-01/GoogleMapsCompatible_Level12/{z}/{y}/{x}.jpg",
    opts: { maxZoom: 12, attribution: "NASA GIBS / Landsat" },
  },
];

// ── Map setup ────────────────────────────────────────────────────────
const map = L.map("aerial-map", { zoomControl: true }).setView(center, 17);
let currentTileLayer = null;
let currentSourceId = "latest";

function setTileSource(source) {
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  currentTileLayer = L.tileLayer(source.url, source.opts).addTo(map);
  currentSourceId = source.id;

  // Update button states
  document.querySelectorAll(".ts-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.id === source.id);
  });

  // Show note for NASA/Landsat sources
  const note = document.getElementById("ts-note");
  if (source.id !== "latest") {
    note.textContent = "Landsat 30m・6月合成（NASA GIBS）";
    note.style.display = "block";
  } else {
    note.style.display = "none";
  }
}

// Build timestamp buttons
const container = document.getElementById("ts-sources");
SOURCES.forEach(src => {
  const btn = document.createElement("button");
  btn.className = "ts-btn" + (src.id === "latest" ? " active" : "");
  btn.dataset.id = src.id;
  btn.innerHTML = `<span class="ts-btn-year">${src.label}</span><span class="ts-btn-sub">${src.sublabel}</span>`;
  btn.addEventListener("click", () => setTileSource(src));
  container.appendChild(btn);
});

// Load default
setTileSource(SOURCES[0]);

// ── Polygon border ───────────────────────────────────────────────────
const latlngs = polygon.map(c => [c[0], c[1]]);
const polyLayer = L.polygon(latlngs, {
  color: "#52b788", fillColor: "transparent", fillOpacity: 0, weight: 3,
}).addTo(map);
map.fitBounds(polyLayer.getBounds().pad(0.15));

// ── Fully-black outside overlay (Canvas) ────────────────────────────
const canvas = document.getElementById("dark-overlay");
const ctx = canvas.getContext("2d");

function drawOverlay() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const w = canvas.width, h = canvas.height;

  // Fill entire canvas black
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);

  // Punch a transparent hole for the farmland polygon
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  latlngs.forEach((ll, i) => {
    const pt = map.latLngToContainerPoint(L.latLng(ll[0], ll[1]));
    if (i === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  });
  ctx.closePath();
  ctx.fill();

  // Draw border on top
  ctx.globalCompositeOperation = "source-over";
  ctx.beginPath();
  latlngs.forEach((ll, i) => {
    const pt = map.latLngToContainerPoint(L.latLng(ll[0], ll[1]));
    if (i === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  });
  ctx.closePath();
  ctx.strokeStyle = "#52b788";
  ctx.lineWidth = 3;
  ctx.stroke();
}

map.on("move", drawOverlay);
map.on("zoom", drawOverlay);
window.addEventListener("resize", drawOverlay);
map.whenReady(() => setTimeout(drawOverlay, 300));
</script>

</body>
</html>
